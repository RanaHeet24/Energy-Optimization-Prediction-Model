name: Build EnergyAI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Capacitor dependencies
        working-directory: android-wrapper
        run: npm install

      - name: Prepare web assets directory
        working-directory: android-wrapper
        run: |
          mkdir -p www
          echo '<html><head><title>EnergyAI</title></head><body></body></html>' > www/index.html

      - name: Initialize Capacitor
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap init EnergyAI com.energyai.optimizer --web-dir www || true

      - name: Add Android platform
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap add android

      - name: Copy web assets
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap copy android

      - name: Sync Capacitor
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap sync android

      - name: Make gradlew executable
        working-directory: android-wrapper/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android-wrapper/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyAI-APK
          path: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: "EnergyAI v1.${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## ⚡ EnergyAI Android App

            **Install Steps:**
            1. Download `app-debug.apk` below
            2. Transfer to Android phone
            3. Settings → Install Unknown Apps → Allow
            4. Open APK file → Install
            5. Open EnergyAI from home screen!
          files: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
