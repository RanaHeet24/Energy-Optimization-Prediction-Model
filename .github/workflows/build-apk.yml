name: Build EnergyAI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java & Node ────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── Android SDK ────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── Capacitor ─────────────────────────────────────────────
      - name: Install Capacitor dependencies
        working-directory: android-wrapper
        run: npm install

      - name: Fix Capacitor binary permissions
        working-directory: android-wrapper
        run: chmod +x ./node_modules/.bin/cap

      - name: Add Android platform (skip if already present)
        working-directory: android-wrapper
        run: |
          if [ ! -d "android" ]; then
            ./node_modules/.bin/cap add android
          else
            echo "Android platform already exists, skipping add."
          fi

      - name: Copy web assets to Android
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap copy android

      - name: Sync Capacitor plugins
        working-directory: android-wrapper
        run: ./node_modules/.bin/cap sync android

      # ── Gradle Build ──────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android-wrapper/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android-wrapper/android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Artifacts & Release ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyAI-APK
          path: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: "EnergyAI v1.${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## ⚡ EnergyAI Android App

            **Install Steps:**
            1. Download `app-debug.apk` below
            2. Transfer to Android phone
            3. Settings → Install Unknown Apps → Allow
            4. Open APK file → Install
            5. Open EnergyAI from home screen!

            > App loads the live Energy Optimizer dashboard from Streamlit Cloud.
          files: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
