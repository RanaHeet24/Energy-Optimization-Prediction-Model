<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no">
  <title>EnergyAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0D1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      font-family: sans-serif;
      color: white;
      text-align: center;
      transition: opacity 0.5s ease;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 28px;
      color: #00FF88;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: #8B949E;
      margin-bottom: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #21262D;
      border-top: 4px solid #00FF88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="logo">⚡</div>
    <div class="title">EnergyAI</div>
    <div class="sub">Home Appliance Energy Optimizer</div>
    <div class="spinner"></div>
  </div>

  <iframe id="frame" src="https://energy-optimization-prediction-model-narpgj8kkawx63syk7k98i.streamlit.app"
    allowfullscreen allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; midi"
    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation allow-top-navigation-by-user-activation">
  </iframe>

  <script>
    var frame = document.getElementById('frame');
    var splash = document.getElementById('splash');

    // Hide splash when iframe loads
    frame.onload = function () {
      setTimeout(function () {
        splash.style.opacity = '0';
        setTimeout(function () {
          splash.style.display = 'none';
        }, 500);
      }, 1000);
    };

    // Fallback: if iframe blocks embedding, do a hard redirect
    frame.onerror = function () {
      window.location.href = "https://energy-optimization-prediction-model-narpgj8kkawx63syk7k98i.streamlit.app";
    };
  </script>
</body>

</html>
