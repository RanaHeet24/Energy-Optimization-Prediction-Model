<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>EnergyAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D1117;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0D1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      font-family: sans-serif;
      color: white;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .logo {
      font-size: 72px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 28px;
      color: #00FF88;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: #8B949E;
      margin-bottom: 40px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #21262D;
      border-top: 4px solid #00FF88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #0D1117;
    }
  </style>
</head>

<body>

  <div id="splash">
    <div class="logo">⚡</div>
    <div class="title">EnergyAI</div>
    <div class="sub">Home Appliance Energy Optimizer</div>
    <div class="spinner"></div>
  </div>

  <iframe id="frame" src="https://energy-optimization-prediction-model-narpgj8kkawx63syk7k98i.streamlit.app/?embed=true"
    allowfullscreen
    allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; midi; clipboard-write; clipboard-read"
    loading="lazy">
  </iframe>

  <script>
    var splash = document.getElementById('splash');
    var frame = document.getElementById('frame');

    frame.addEventListener('load', function () {
      setTimeout(function () {
        splash.style.opacity = '0';
        setTimeout(function () { splash.style.display = 'none'; }, 650);
      }, 1200);
    });

    // If iframe fails entirely, go directly to the URL
    frame.addEventListener('error', function () {
      window.location.href = "https://energy-optimization-prediction-model-narpgj8kkawx63syk7k98i.streamlit.app";
    });

    // Safety fallback after 15s if nothing loads
    setTimeout(function () {
      if (splash.style.display !== 'none') {
        splash.style.opacity = '0';
        setTimeout(function () { splash.style.display = 'none'; }, 650);
      }
    }, 15000);
  </script>

</body>

</html>
